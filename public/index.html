<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-multi</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --panel-bg: #161625;
    --panel-border: #2a2a40;
    --input-bg: #1c1c30;
    --text: #e0e0ee;
    --text-dim: #8888a0;
    --accent: #7c3aed;
    --accent-hover: #6d28d9;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --tool-bg: #1a1a35;
    --radius: 8px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
    background: var(--panel-bg);
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--text-dim); font-weight: 400; }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  .conn-dot.connected { background: var(--green); }

  .btn {
    padding: 5px 12px;
    border: 1px solid var(--panel-border);
    background: var(--input-bg);
    color: var(--text);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }

  .btn:hover { border-color: var(--accent); background: var(--panel-bg); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Panels container */
  #panels {
    flex: 1;
    display: grid;
    gap: 1px;
    background: var(--panel-border);
    overflow: hidden;
  }

  /* Better grid: 1 panel = full width, 2 = 50/50, 3 = 33/33/33, 4+ = 2-col grid */
  #panels.layout-columns { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
  #panels.layout-grid { grid-template-columns: repeat(2, 1fr); }

  /* Panel */
  .panel {
    display: flex;
    flex-direction: column;
    background: var(--panel-bg);
    min-width: 0;
    min-height: 300px;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
    min-height: 36px;
  }

  .panel-name {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    padding: 2px 6px;
    outline: none;
    min-width: 60px;
    max-width: 160px;
    flex-shrink: 1;
    cursor: text;
    transition: border-color 0.15s;
  }
  .panel-name:hover { border-color: var(--panel-border); }
  .panel-name:focus { border-color: var(--accent); background: var(--input-bg); }
  .panel-name::placeholder { color: var(--text-dim); font-weight: 400; }

  .panel-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }

  .panel-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(124, 58, 237, 0.15);
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .panel-header .cwd-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    color: var(--text);
    padding: 4px 8px;
    font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    outline: none;
    min-width: 0;
  }

  .panel-header .cwd-input:focus {
    border-color: var(--accent);
  }

  .panel-header .cwd-input::placeholder {
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.running {
    background: var(--green);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .status-dot.error { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .panel-close {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    line-height: 1;
  }

  .panel-close:hover { color: var(--red); }

  .panel-timer {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    color: var(--text-dim);
    padding: 2px 6px;
    border-radius: 4px;
    min-width: 42px;
    text-align: center;
    transition: color 0.2s;
  }
  .panel-timer.active {
    color: var(--green);
  }

  .panel-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    color: var(--text-dim);
    background: var(--input-bg);
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .panel-badge.ram { color: var(--orange); }
  .panel-badge.agents { color: var(--blue); }
  .panel-badge.hidden { display: none; }

  /* Output area */
  .panel-output {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12.5px;
    line-height: 1.5;
    scroll-behavior: smooth;
  }

  .panel-output::-webkit-scrollbar { width: 6px; }
  .panel-output::-webkit-scrollbar-track { background: transparent; }
  .panel-output::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
  .panel-output::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .msg { margin-bottom: 8px; white-space: pre-wrap; word-break: break-word; }
  .msg-system { color: var(--text-dim); font-style: italic; font-size: 11px; }
  .msg-assistant { color: var(--text); }
  .msg-error { color: var(--red); }
  .msg-tool {
    background: var(--tool-bg);
    border-left: 3px solid var(--blue);
    padding: 6px 10px;
    border-radius: 0 4px 4px 0;
    font-size: 11.5px;
    color: var(--text-dim);
    margin: 4px 0;
  }
  .msg-tool .tool-name { color: var(--blue); font-weight: 600; }
  .msg-tool-result {
    background: var(--tool-bg);
    border-left: 3px solid var(--green);
    padding: 6px 10px;
    border-radius: 0 4px 4px 0;
    font-size: 11px;
    color: var(--text-dim);
    margin: 4px 0;
    max-height: 150px;
    overflow-y: auto;
  }
  .msg-done {
    color: var(--green);
    font-size: 11px;
    border-top: 1px solid var(--panel-border);
    padding-top: 6px;
    margin-top: 6px;
  }

  /* Input area */
  .panel-input {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    padding: 8px 10px;
    border-top: 1px solid var(--panel-border);
    flex-shrink: 0;
  }

  .panel-input textarea {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 38px;
    max-height: 120px;
    line-height: 1.4;
  }

  .panel-input textarea:focus { border-color: var(--accent); }
  .panel-input textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    padding: 8px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .send-btn:hover { background: var(--accent-hover); }

  .send-btn.stop {
    background: var(--red);
  }

  .send-btn.stop:hover { background: #dc2626; }

  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .panel-input { position: relative; }

  .slash-dropdown {
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    max-height: 260px;
    overflow-y: auto;
    display: none;
    z-index: 100;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
    margin-bottom: 4px;
  }
  .slash-dropdown.visible { display: block; }
  .slash-dropdown::-webkit-scrollbar { width: 5px; }
  .slash-dropdown::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }

  .slash-cat-label {
    padding: 4px 10px 2px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-top: 1px solid var(--panel-border);
  }
  .slash-cat-label:first-child { border-top: none; }

  .slash-item {
    padding: 5px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .slash-item:hover, .slash-item.selected {
    background: rgba(124, 58, 237, 0.12);
  }
  .slash-item .cmd {
    font-weight: 600;
    min-width: 140px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
  }
  .slash-item .desc {
    color: var(--text-dim);
    font-size: 11px;
    flex: 1;
    text-align: right;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Responsive: stack vertically on narrow screens */
  @media (max-width: 900px) {
    #panels { grid-template-columns: 1fr !important; grid-template-rows: auto; }
  }
</style>
</head>

// --- Panel Class ---
class Panel {
  constructor(id) {
    this.id = id;
    this.status = "idle";
    this.cwd = "";
    this.el = null;
    this.outputEl = null;
    this.inputEl = null;
    this.cwdEl = null;
    this.nameEl = null;
    this.statusEl = null;
    this.sendBtn = null;
    this.timerEl = null;
    this.timerInterval = null;
    this.startTime = null;
    this.ramEl = null;
    this.agentsEl = null;
    this.dropdownEl = null;
    this.filteredCmds = [];
    this.selectedIndex = 0;
    this.outputCount = 0;
    this.build();
  }

  build() {
    const div = document.createElement("div");
    div.className = "panel";
    div.innerHTML = `
      <div class="panel-header">
        <span class="panel-num">${this.id + 1}</span>
        <input type="text" class="panel-name" placeholder="Untitled" spellcheck="false" maxlength="30">
        <input type="text" class="cwd-input" placeholder="C:\\path\\to\\project" spellcheck="false">
        <div class="panel-meta">
          <span class="panel-badge ram hidden" title="RAM usage">0 MB</span>
          <span class="panel-badge agents hidden" title="Active sub-agents">0 agents</span>
          <span class="panel-timer" title="Elapsed time">--:--</span>
          <div class="status-dot" title="idle"></div>
          <button class="panel-close" title="Remove panel">&times;</button>
        </div>
      </div>
      <div class="panel-output"></div>
      <div class="panel-input">
        <div class="slash-dropdown"></div>
        <textarea rows="1" placeholder="Send a prompt... (Enter to send, Shift+Enter for newline)"></textarea>
        <button class="send-btn">Send</button>
      </div>
    `;

    this.el = div;
    this.nameEl = div.querySelector(".panel-name");
    this.cwdEl = div.querySelector(".cwd-input");
    this.timerEl = div.querySelector(".panel-timer");
    this.statusEl = div.querySelector(".status-dot");
    this.outputEl = div.querySelector(".panel-output");
    this.inputEl = div.querySelector("textarea");
    this.sendBtn = div.querySelector(".send-btn");
    this.ramEl = div.querySelector(".panel-badge.ram");
    this.agentsEl = div.querySelector(".panel-badge.agents");
    this.dropdownEl = div.querySelector(".slash-dropdown");

    const closeBtn = div.querySelector(".panel-close");
    closeBtn.addEventListener("click", () => this.remove());

    this.sendBtn.addEventListener("click", () => this.handleSend());

    this.inputEl.addEventListener("keydown", (e) => {
      if (this.dropdownEl.classList.contains("visible")) {
        if (e.key === "ArrowDown") {
          e.preventDefault();
          this.selectedIndex = Math.min(this.selectedIndex + 1, this.filteredCmds.length - 1);
          this.renderDropdown();
          return;
        }
        if (e.key === "ArrowUp") {
          e.preventDefault();
          this.selectedIndex = Math.max(this.selectedIndex - 1, 0);
          this.renderDropdown();
          return;
        }
        if (e.key === "Tab" || (e.key === "Enter" && !e.shiftKey)) {
          e.preventDefault();
          if (this.filteredCmds[this.selectedIndex]) {
            this.executeSlashCmd(this.filteredCmds[this.selectedIndex]);
          }
          return;
        }
        if (e.key === "Escape") {
          e.preventDefault();
          this.hideDropdown();
          return;
        }
      }
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        this.handleSend();
      }
    });

    // Auto-resize textarea + slash command detection
    this.inputEl.addEventListener("input", () => {
      this.inputEl.style.height = "auto";
      this.inputEl.style.height = Math.min(this.inputEl.scrollHeight, 120) + "px";
      const val = this.inputEl.value;
      if (val.startsWith("/") && !val.includes("\n")) {
        this.showDropdown(val);
      } else {
        this.hideDropdown();
      }
    });

    this.inputEl.addEventListener("blur", () => {
      setTimeout(() => this.hideDropdown(), 150);
    });

    // Load saved name from localStorage
    const savedName = localStorage.getItem(`panel-name-${this.id}`);
    if (savedName) this.nameEl.value = savedName;

    this.nameEl.addEventListener("change", () => {
      localStorage.setItem(`panel-name-${this.id}`, this.nameEl.value);
    });

    // Load saved cwd from localStorage
    const saved = localStorage.getItem(`panel-cwd-${this.id}`);
    if (saved) this.cwdEl.value = saved;

    this.cwdEl.addEventListener("change", () => {
      localStorage.setItem(`panel-cwd-${this.id}`, this.cwdEl.value);
    });
  }

  handleSend() {
    if (this.status === "running") {
      // Stop
      this.sendWs({ type: "cancel", panelId: this.id });
      return;
    }

    const prompt = this.inputEl.value.trim();
    const cwd = this.cwdEl.value.trim();

    if (!prompt) return;
    if (!cwd) {
      this.appendSystem("Set a project directory first.");
      this.cwdEl.focus();
      return;
    }

    // Show user prompt
    this.appendUser(prompt);
    this.inputEl.value = "";
    this.inputEl.style.height = "auto";

    this.sendWs({ type: "prompt", panelId: this.id, cwd, prompt });
  }

  sendWs(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  setStatus(status) {
    this.status = status;
    this.statusEl.className = "status-dot " + status;
    this.statusEl.title = status;

    if (status === "running") {
      this.startTimer();
      this.sendBtn.textContent = "Stop";
      this.sendBtn.classList.add("stop");
    } else {
      this.stopTimer();
      this.sendBtn.textContent = "Send";
      this.sendBtn.classList.remove("stop");
    }
  }

  startTimer() {
    this.stopTimer();
    this.startTime = Date.now();
    this.timerEl.classList.add("active");
    this.timerEl.textContent = "00:00";
    this.timerInterval = setInterval(() => {
      this.timerEl.textContent = this.formatTime(Date.now() - this.startTime);
    }, 1000);
  }

  stopTimer() {
    if (this.timerInterval) {
      clearInterval(this.timerInterval);
      this.timerInterval = null;
    }
    this.timerEl.classList.remove("active");
  }

  formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    if (m >= 60) {
      const h = Math.floor(m / 60);
      return `${h}:${String(m % 60).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  updateStats(ram, agents) {
    if (ram > 0) {
      const mb = (ram / 1024 / 1024).toFixed(0);
      this.ramEl.textContent = `${mb} MB`;
      this.ramEl.classList.remove("hidden");
    } else {
      this.ramEl.classList.add("hidden");
    }
    if (agents > 0) {
      this.agentsEl.textContent = `${agents} agent${agents > 1 ? 's' : ''}`;
      this.agentsEl.classList.remove("hidden");
    } else {
      this.agentsEl.classList.add("hidden");
    }
  }

  showDropdown(filter) {
    const query = filter.toLowerCase().slice(1);
    this.filteredCmds = SLASH_COMMANDS.filter(c => c.cmd.slice(1).startsWith(query));
    if (this.filteredCmds.length === 0) { this.hideDropdown(); return; }
    this.selectedIndex = 0;
    this.renderDropdown();
    this.dropdownEl.classList.add("visible");
  }

  hideDropdown() {
    this.dropdownEl.classList.remove("visible");
    this.filteredCmds = [];
    this.selectedIndex = 0;
  }

  renderDropdown() {
    let html = "";
    let lastCat = "";
    this.filteredCmds.forEach((c, i) => {
      if (c.cat !== lastCat) {
        lastCat = c.cat;
        const color = CATEGORY_COLORS[c.cat] || "var(--text-dim)";
        html += `<div class="slash-cat-label" style="color:${color}">${CATEGORY_LABELS[c.cat] || c.cat}</div>`;
      }
      html += `<div class="slash-item${i === this.selectedIndex ? ' selected' : ''}" data-index="${i}">
        <span class="cmd" style="color:${CATEGORY_COLORS[c.cat] || 'var(--accent)'}">${esc(c.cmd)}</span>
        <span class="desc">${esc(c.desc)}</span>
      </div>`;
    });
    this.dropdownEl.innerHTML = html;

    this.dropdownEl.querySelectorAll(".slash-item").forEach(el => {
      el.addEventListener("mousedown", (e) => {
        e.preventDefault();
        this.executeSlashCmd(this.filteredCmds[parseInt(el.dataset.index)]);
      });
    });

    const sel = this.dropdownEl.querySelector(".selected");
    if (sel) sel.scrollIntoView({ block: "nearest" });
  }

  executeSlashCmd(cmd) {
    this.hideDropdown();
    this.inputEl.value = "";
    this.inputEl.style.height = "auto";

    if (cmd.type === "client") {
      if (cmd.cmd === "/clear") this.clear();
      if (cmd.cmd === "/help") {
        this.appendSystem("Available commands (type / to search):");
        let lastCat = "";
        for (const c of SLASH_COMMANDS) {
          if (c.cat !== lastCat) {
            lastCat = c.cat;
            this.appendSystem(`\n  [${CATEGORY_LABELS[c.cat] || c.cat}]`);
          }
          this.appendSystem(`    ${c.cmd.padEnd(24)} ${c.desc}`);
        }
      }
      return;
    }

    const cwd = this.cwdEl.value.trim();
    if (!cwd) {
      this.appendSystem("Set a project directory first.");
      this.cwdEl.focus();
      return;
    }
    this.appendUser(cmd.cmd);
    this.sendWs({ type: "prompt", panelId: this.id, cwd, prompt: `${cmd.cmd} ${cmd.desc}` });
  }

  appendUser(text) {
    const div = document.createElement("div");
    div.className = "msg msg-system";
    div.textContent = `> ${text}`;
    this.appendToOutput(div);
  }

  appendSystem(text) {
    const div = document.createElement("div");
    div.className = "msg msg-system";
    div.textContent = text;
    this.appendToOutput(div);
  }

  appendError(text) {
    const div = document.createElement("div");
    div.className = "msg msg-error";
    div.textContent = text;
    this.appendToOutput(div);
  }

  appendDone(exitCode) {
    const div = document.createElement("div");
    div.className = "msg msg-done";
    div.textContent = exitCode === 0 ? "--- completed ---" : `--- exited (code ${exitCode}) ---`;
    this.appendToOutput(div);
  }

  appendClaudeMessage(data) {
    if (!data || !data.type) return;

    switch (data.type) {
      case "system": {
        if (data.subtype === "init") {
          this.appendSystem(`Session: ${data.session_id || "started"}`);
        }
        break;
      }
      case "assistant": {
        const content = data.message?.content;
        if (!content || !Array.isArray(content)) break;
        for (const block of content) {
          if (block.type === "text" && block.text) {
            const div = document.createElement("div");
            div.className = "msg msg-assistant";
            div.textContent = block.text;
            this.appendToOutput(div);
          } else if (block.type === "tool_use") {
            const div = document.createElement("div");
            div.className = "msg msg-tool";
            const inputStr = typeof block.input === "string"
              ? block.input
              : truncate(JSON.stringify(block.input), 200);
            div.innerHTML = `<span class="tool-name">${esc(block.name)}</span> ${esc(inputStr)}`;
            this.appendToOutput(div);
          }
        }
        break;
      }
      case "user": {
        const content = data.message?.content;
        if (!content || !Array.isArray(content)) break;
        for (const block of content) {
          if (block.type === "tool_result") {
            const text = typeof block.content === "string"
              ? block.content
              : JSON.stringify(block.content);
            if (text && text.length > 0) {
              const div = document.createElement("div");
              div.className = "msg msg-tool-result";
              div.textContent = truncate(text, 1000);
              this.appendToOutput(div);
            }
          }
        }
        break;
      }
      case "result": {
        const text = data.result;
        if (text) {
          const div = document.createElement("div");
          div.className = "msg msg-assistant";
          div.textContent = text;
          this.appendToOutput(div);
        }
        break;
      }
    }
  }

  appendToOutput(el) {
    this.outputEl.appendChild(el);
    this.outputCount++;
    // Trim old messages if too many
    while (this.outputCount > MAX_OUTPUT_LINES && this.outputEl.firstChild) {
      this.outputEl.removeChild(this.outputEl.firstChild);
      this.outputCount--;
    }
    // Auto-scroll
    this.outputEl.scrollTop = this.outputEl.scrollHeight;
  }

  clear() {
    this.outputEl.innerHTML = "";
    this.outputCount = 0;
  }

  remove() {
    this.stopTimer();
    if (this.status === "running") {
      this.sendWs({ type: "cancel", panelId: this.id });
    }
    this.el.remove();
    const idx = panels.indexOf(this);
    if (idx !== -1) panels.splice(idx, 1);
    updateGrid();
    savePanelCount();
  }
}

// --- Helpers ---
function esc(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function truncate(str, max) {
  return str.length > max ? str.slice(0, max) + "..." : str;
}

// --- Layout ---
function updateGrid() {
  const container = document.getElementById("panels");
  const n = panels.length;
  if (n === 0) {
    container.innerHTML = '<div class="empty-state">Click "+ Panel" to get started</div>';
    return;
  }

  const empty = container.querySelector(".empty-state");
  if (empty) empty.remove();

  container.className = layout === "grid" ? "layout-grid" : "layout-columns";
}

function toggleLayout() {
  layout = layout === "columns" ? "grid" : "columns";
  document.getElementById("layoutBtn").textContent = layout === "columns" ? "Grid" : "Columns";
  updateGrid();
}

// --- Panel Management ---
function addPanel() {
  if (panels.length >= MAX_PANELS) return;
  const id = panels.length;
  const panel = new Panel(id);
  panels.push(panel);
  const container = document.getElementById("panels");
  // Remove empty state
  const empty = container.querySelector(".empty-state");
  if (empty) empty.remove();
  container.appendChild(panel.el);
  updateGrid();
  savePanelCount();
  document.getElementById("addPanelBtn").disabled = panels.length >= MAX_PANELS;
}

function savePanelCount() {
  localStorage.setItem("panel-count", String(panels.length));
}

function findPanel(panelId) {
  return panels.find(p => p.id === panelId);
}

// --- WebSocket ---
function connectWs() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById("connDot").classList.add("connected");
    document.getElementById("connLabel").textContent = "connected";
  };

  ws.onclose = () => {
    document.getElementById("connDot").classList.remove("connected");
    document.getElementById("connLabel").textContent = "disconnected";
    // Reconnect after delay
    setTimeout(connectWs, 2000);
  };

  ws.onerror = () => {};

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      const panel = findPanel(msg.panelId);
      if (!panel && msg.panelId >= 0) return;

      switch (msg.type) {
        case "claude":
          panel.appendClaudeMessage(msg.data);
          break;
        case "claude_raw":
          panel.appendSystem(msg.data);
          break;
        case "stderr":
          // Only show if non-empty and not just whitespace
          if (msg.data && msg.data.trim()) {
            panel.appendError(msg.data);
          }
          break;
        case "status":
          if (panel) panel.setStatus(msg.status);
          break;
        case "error":
          if (panel) panel.appendError(msg.message);
          break;
        case "stats":
          if (panel) panel.updateStats(msg.ram, msg.agents);
          break;
        case "done":
          if (panel) {
            panel.appendDone(msg.exitCode);
            panel.updateStats(0, 0);
          }
          break;
      }
    } catch {}
  };
}

// --- Init ---
document.getElementById("addPanelBtn").addEventListener("click", addPanel);
document.getElementById("layoutBtn").addEventListener("click", toggleLayout);

// Restore panel count
const savedCount = parseInt(localStorage.getItem("panel-count") || "1", 10);
const initialCount = Math.max(1, Math.min(savedCount, MAX_PANELS));
for (let i = 0; i < initialCount; i++) addPanel();

connectWs();
</script>
